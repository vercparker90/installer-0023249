name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wrapper
        run: cd wrapper && wasm-pack build --target web --out-dir ../site/pkg

      - name: Build connector
        run: cd connector && wasm-pack build --target web --out-dir ../site

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp -r site /tmp/site_deploy
          # Удаляем всё лишнее что мешает переключению
          rm -rf connector/target wrapper/target
          rm -f connector/Cargo.lock wrapper/Cargo.lock
          git fetch origin gh-pages
          git checkout gh-pages
          git rm -rf . || true
          cp -r /tmp/site_deploy/* .
          git add .
          git commit -m "deploy" || echo "nothing to commit"
          git push origin gh-pages
