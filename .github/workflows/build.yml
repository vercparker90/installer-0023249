name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wrapper
        run: cd wrapper && wasm-pack build --target web --out-dir ../site/pkg

      - name: Build connector
        run: cd connector && wasm-pack build --target web --out-dir ../site

      - name: Show site contents
        run: find site/ -type f

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # Сохраняем собранные файлы
          cp -r site /tmp/site_deploy
          git fetch origin gh-pages
          # Переключаемся принудительно
          git checkout -f gh-pages
          # Удаляем старые файлы (кроме .git)
          find . -not -path './.git*' -not -name '.' -delete 2>/dev/null || true
          # Копируем новые
          cp -r /tmp/site_deploy/. .
          git add -A
          git commit -m "deploy" || echo "nothing to commit"
          git push origin gh-pages
